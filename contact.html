<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Tastes of Africa</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Ubuntu:wght@700&display=swap" rel="stylesheet">
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="recipes.html">Recipes</a></li>
      <li><a href="regions.html">Regions</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
  <main>
    <h1>Contact Us</h1>
    <form id="contact-form">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
      <label for="country">Country:</label>
      <input list="countries" id="country" name="country" required>
      <datalist id="countries">
        <option value="Nigeria">
        <option value="Morocco">
        <option value="Ethiopia">
        <option value="South Africa">
        <option value="Ghana">
        <option value="Kenya">
      </datalist>
      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="4" required></textarea>
      <button type="submit">Submit</button>
    </form>
  </main>
  <footer>
    <form id="newsletter">
      <label for="newsletter-email">Sign up for our newsletter:</label>
      <input type="email" id="newsletter-email" name="newsletter-email" placeholder="Your email">
      <button type="submit">Subscribe</button>
    </form>
    <p>&copy; 2026 Tastes of Africa</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
